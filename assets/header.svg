<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Cyan glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#00f0ff" flood-opacity="0.7"/>
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#bd00ff" flood-opacity="0.7"/>
    </filter>
    
    <!-- Deep grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes gridPulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }
    @keyframes borderGlow {
      0%, 100% { stroke: #00f0ff; filter: drop-shadow(0 0 2px rgba(0, 240, 255, 0.4)); }
      50% { stroke: #bd00ff; filter: drop-shadow(0 0 8px rgba(189, 0, 255, 0.6)); }
    }
    @keyframes line1 {
      0% { opacity: 0; }
      2% { opacity: 1; }
      100% { opacity: 1; }
    }
    @keyframes line2 {
      0%, 15% { opacity: 0; }
      20% { opacity: 1; }
      100% { opacity: 1; }
    }
    @keyframes line3 {
      0%, 45% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 1; }
    }
    @keyframes rotateChart {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes orbitPulse {
      0%, 100% { r: 40; stroke-opacity: 0.6; }
      50% { r: 44; stroke-opacity: 0.9; }
    }
    
    .terminal-body {
      fill: #090d16;
      stroke: #00f0ff;
      stroke-width: 1.5;
      animation: borderGlow 8s infinite ease-in-out;
    }
    .grid-bg {
      fill: url(#grid);
      animation: gridPulse 6s infinite ease-in-out;
    }
    .window-title {
      font-family: 'Fira Code', monospace, Courier;
      font-size: 11px;
      fill: #6272a4;
    }
    .term-text {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 14px;
      fill: #f8f8f2;
    }
    .prompt {
      fill: #50fa7b;
      font-weight: bold;
    }
    .command {
      fill: #f1fa8c;
    }
    .accent-cyan {
      fill: #00f0ff;
      font-weight: bold;
      filter: drop-shadow(0 0 4px rgba(0,240,255,0.5));
    }
    .accent-orange {
      fill: #ffb86c;
      font-style: italic;
    }
    .cursor {
      fill: #00f0ff;
      animation: blink 0.8s infinite;
    }
    .anim-line1 { animation: line1 12s infinite; transform-origin: 0 0; }
    .anim-line2 { animation: line2 12s infinite; transform-origin: 0 0; }
    .anim-line3 { animation: line3 12s infinite; transform-origin: 0 0; }
    
    .chart-ring {
      transform-origin: 600px 105px;
      animation: rotateChart 15s infinite linear;
    }
    .chart-orbit {
      transform-origin: 600px 105px;
      animation: orbitPulse 4s infinite ease-in-out;
    }
  </style>

  <!-- Main Terminal Card -->
  <g>
    <!-- Terminal Background -->
    <rect x="5" y="5" width="790" height="240" rx="12" ry="12" class="terminal-body"/>
    
    <!-- Grid Overlay -->
    <rect x="6" y="6" width="788" height="238" rx="11" ry="11" class="grid-bg"/>

    <!-- Terminal Header Bar -->
    <rect x="6" y="6" width="788" height="30" rx="11" ry="11" fill="#0d1117" fill-opacity="0.7" />
    <line x1="5" y1="36" x2="795" y2="36" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.3" />

    <!-- Window Controls (OS-style dots) -->
    <circle cx="25" cy="21" r="5" fill="#FF5F56" />
    <circle cx="41" cy="21" r="5" fill="#FFBD2E" />
    <circle cx="57" cy="21" r="5" fill="#27C93F" />
    
    <text x="400" y="24" text-anchor="middle" class="window-title">shashank@system: ~ (zsh)</text>

    <!-- Terminal Content Area -->
    <g transform="translate(30, 65)">
      
      <!-- Line 1: Shell Prompt & Command -->
      <g class="anim-line1">
        <text x="0" y="0" class="term-text prompt">❯</text>
        <text x="18" y="0" class="term-text command">neofetch --dev-profile</text>
      </g>

      <!-- Line 2: The Main Banner/Neofetch Stats -->
      <g class="anim-line2" transform="translate(0, 25)">
        <!-- Beautiful Neon Title -->
        <text x="0" y="10" font-family="'Fira Code', monospace" font-size="28" font-weight="900" class="accent-cyan">SHASHANK KUMAR</text>
        
        <!-- Divider -->
        <line x1="0" y1="22" x2="255" y2="22" stroke="#00f0ff" stroke-width="2" stroke-opacity="0.8" filter="url(#glow)" />
        
        <!-- Stats list -->
        <text x="0" y="42" class="term-text"><tspan fill="#ff79c6" font-weight="bold">OS</tspan>: NeuralArch Linux x86_64</text>
        <text x="0" y="62" class="term-text"><tspan fill="#ff79c6" font-weight="bold">Kernel</tspan>: Fullstack-6.10-lko-scalable</text>
        <text x="0" y="82" class="term-text"><tspan fill="#ff79c6" font-weight="bold">Uptime</tspan>: Always Active (24/7)</text>
        <text x="0" y="102" class="term-text"><tspan fill="#ff79c6" font-weight="bold">Focus</tspan>: Full-Stack Ecosystems &amp; AI Automation</text>
        <text x="0" y="122" class="term-text"><tspan fill="#ff79c6" font-weight="bold">Status</tspan>: Building scalable architectures</text>
      </g>

      <!-- Right side decoration: Interactive Spinning Tech Core Diagram -->
      <g class="anim-line2">
        <!-- Outer Glowing Circle -->
        <circle cx="600" cy="105" r="52" fill="none" stroke="#bd00ff" stroke-width="1.5" stroke-opacity="0.8" class="chart-orbit" filter="url(#glow-magenta)"/>
        
        <!-- Inner rotating dashed circle -->
        <circle cx="600" cy="105" r="42" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="10 6" stroke-opacity="0.7" class="chart-ring"/>
        
        <!-- Internal core geometric shapes -->
        <circle cx="600" cy="105" r="28" fill="none" stroke="#ff79c6" stroke-width="1.5" stroke-opacity="0.9"/>
        <polygon points="600,88 615,114 585,114" fill="#00f0ff" fill-opacity="0.3" stroke="#00f0ff" stroke-width="1"/>
        
        <!-- Glowing central particle node -->
        <circle cx="600" cy="105" r="6" fill="#00f0ff" filter="url(#glow)"/>
        
        <!-- Tech design connecting grid lines -->
        <line x1="600" y1="45" x2="600" y2="165" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2 2" />
        <line x1="540" y1="105" x2="660" y2="105" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2 2" />
        
        <!-- Core Node label -->
        <text x="600" y="172" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#6272a4" letter-spacing="1.5">CORE_ACTIVE</text>
      </g>

      <!-- Line 3: Prompt + Core Motto -->
      <g class="anim-line3" transform="translate(0, 165)">
        <text x="0" y="0" class="term-text prompt">❯</text>
        <text x="18" y="0" class="term-text accent-orange">"Architecting scalable logic, writing clean code..."</text>
        <!-- Blinking cursor -->
        <rect x="428" y="-12" width="8" height="15" class="cursor" />
      </g>

    </g>
  </g>
</svg>
