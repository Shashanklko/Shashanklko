<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" width="100%" height="100%">
  <defs>
    <!-- Cyan glow filter -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#00f0ff" flood-opacity="0.7"/>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#50fa7b" flood-opacity="0.8"/>
    </filter>
  </defs>

  <style>
    @keyframes pulseActive {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.6); opacity: 0.9; }
    }
    @keyframes textPulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; fill: #00f0ff; filter: drop-shadow(0 0 2px rgba(0, 240, 255, 0.5)); }
    }
    @keyframes launchPulse {
      0%, 100% { opacity: 0.8; fill: #00f0ff; }
      50% { opacity: 1; fill: #50fa7b; filter: drop-shadow(0 0 4px rgba(80, 250, 123, 0.6)); }
    }
    
    .card-container {
      fill: #090d16;
      stroke: #00f0ff;
      stroke-width: 1.5;
      stroke-opacity: 0.6;
      transition: all 0.3s ease-in-out;
      cursor: pointer;
    }
    .card-g:hover .card-container {
      stroke: #00f0ff;
      stroke-width: 2;
      stroke-opacity: 1;
      filter: url(#glow-cyan);
      fill: #0d1117;
    }
    .card-g:hover .title-text {
      fill: #00f0ff;
      filter: drop-shadow(0 0 2px rgba(0,240,255,0.6));
    }
    .card-g:hover .launch-btn {
      animation: launchPulse 1.5s infinite ease-in-out;
    }
    
    .title-text {
      font-family: 'Fira Code', monospace;
      font-size: 18px;
      font-weight: 900;
      fill: #f8f8f2;
      transition: all 0.3s ease;
    }
    .subtitle-text {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #6272a4;
      font-style: italic;
    }
    .desc-text {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 11px;
      fill: #a9b1d6;
    }
    .tech-badge-bg {
      fill: #1b2438;
      rx: 3px;
    }
    .tech-text {
      font-family: 'Fira Code', monospace;
      font-size: 9px;
      fill: #00f0ff;
      font-weight: bold;
    }
    .status-lbl {
      font-family: 'Fira Code', monospace;
      font-size: 9px;
      fill: #50fa7b;
      font-weight: bold;
    }
    .launch-btn {
      font-family: 'Fira Code', monospace;
      font-size: 10px;
      font-weight: bold;
      fill: #6272a4;
      transition: all 0.3s ease;
    }
    
    .pulse-ring {
      transform-origin: 20px 22px;
      animation: pulseActive 2s infinite ease-in-out;
      filter: url(#glow-green);
    }
    .pulse-core {
      fill: #50fa7b;
      filter: url(#glow-green);
    }
  </style>

  <!-- Interactive Group Wrapper -->
  <g class="card-g">
    <!-- Card Base Panel -->
    <rect x="5" y="5" width="370" height="210" rx="10" ry="10" class="card-container"/>

    <!-- Glassmorphic Top Bar -->
    <rect x="6" y="6" width="368" height="32" rx="9" ry="9" fill="#0d1117" fill-opacity="0.6"/>
    <line x1="5" y1="38" x2="375" y2="38" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.3" />

    <!-- Interactive Status Module -->
    <circle cx="20" cy="22" r="6" fill="none" stroke="#50fa7b" stroke-width="1" class="pulse-ring"/>
    <circle cx="20" cy="22" r="3" class="pulse-core"/>
    <text x="32" y="25" class="status-lbl">SYS_ACTIVE</text>

    <text x="350" y="25" text-anchor="end" class="subtitle-text">ID: LAW_EZY_01</text>

    <!-- Main Project Info -->
    <text x="20" y="65" class="title-text">⚖️ LawEZY Platform</text>
    <text x="20" y="80" class="subtitle-text">Legal &amp; Financial Services Ecosystem</text>

    <!-- Detailed Bullet Text -->
    <text x="20" y="105" class="desc-text">• Connects clients with verified legal professionals.</text>
    <text x="20" y="122" class="desc-text">• Engineered appointment booking &amp; chat lifecycle.</text>
    <text x="20" y="139" class="desc-text">• Integrated secure tokenized transaction models.</text>

    <!-- Tech Badges (Horizontal Grid) -->
    <g transform="translate(20, 160)">
      <!-- Badge 1: React -->
      <g>
        <rect width="45" height="18" class="tech-badge-bg"/>
        <text x="22.5" y="12" text-anchor="middle" class="tech-text">React</text>
      </g>
      <!-- Badge 2: Spring -->
      <g transform="translate(50, 0)">
        <rect width="52" height="18" class="tech-badge-bg"/>
        <text x="26" y="12" text-anchor="middle" class="tech-text">Spring</text>
      </g>
      <!-- Badge 3: Node.js -->
      <g transform="translate(107, 0)">
        <rect width="50" height="18" class="tech-badge-bg"/>
        <text x="25" y="12" text-anchor="middle" class="tech-text">NodeJS</text>
      </g>
      <!-- Badge 4: Socket.io -->
      <g transform="translate(162, 0)">
        <rect width="52" height="18" class="tech-badge-bg"/>
        <text x="26" y="12" text-anchor="middle" class="tech-text">Sockets</text>
      </g>
    </g>

    <!-- Interactive Launch Link Trigger -->
    <text x="350" y="200" text-anchor="end" class="launch-btn">[LAUNCH_SYSTEM] ↗</text>
  </g>
</svg>
