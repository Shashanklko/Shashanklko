<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" width="100%" height="100%">
  <defs>
    <!-- Magenta glow filter -->
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#bd00ff" flood-opacity="0.7"/>
    </filter>
    <filter id="glow-laser" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#ff79c6" flood-opacity="0.8"/>
    </filter>
  </defs>

  <style>
    @keyframes laserScan {
      0%, 100% { y: 45; opacity: 0.1; }
      10% { opacity: 0.8; }
      50% { y: 155; opacity: 0.8; }
      90% { opacity: 0.8; }
      98% { opacity: 0.1; }
    }
    @keyframes pulseActive {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.6); opacity: 0.9; }
    }
    @keyframes launchPulse {
      0%, 100% { opacity: 0.8; fill: #bd00ff; }
      50% { opacity: 1; fill: #ff79c6; filter: drop-shadow(0 0 4px rgba(255, 121, 198, 0.6)); }
    }
    
    .card-container {
      fill: #090d16;
      stroke: #bd00ff;
      stroke-width: 1.5;
      stroke-opacity: 0.6;
      transition: all 0.3s ease-in-out;
      cursor: pointer;
    }
    .card-g:hover .card-container {
      stroke: #ff79c6;
      stroke-width: 2;
      stroke-opacity: 1;
      filter: url(#glow-magenta);
      fill: #0d1117;
    }
    .card-g:hover .title-text {
      fill: #ff79c6;
      filter: drop-shadow(0 0 2px rgba(255,121,198,0.6));
    }
    .card-g:hover .launch-btn {
      animation: launchPulse 1.5s infinite ease-in-out;
    }
    
    .title-text {
      font-family: 'Fira Code', monospace;
      font-size: 18px;
      font-weight: 900;
      fill: #f8f8f2;
      transition: all 0.3s ease;
    }
    .subtitle-text {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #6272a4;
      font-style: italic;
    }
    .desc-text {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 11px;
      fill: #a9b1d6;
    }
    .tech-badge-bg {
      fill: #1b2438;
      rx: 3px;
    }
    .tech-text {
      font-family: 'Fira Code', monospace;
      font-size: 9px;
      fill: #bd00ff;
      font-weight: bold;
    }
    .status-lbl {
      font-family: 'Fira Code', monospace;
      font-size: 9px;
      fill: #50fa7b;
      font-weight: bold;
    }
    .launch-btn {
      font-family: 'Fira Code', monospace;
      font-size: 10px;
      font-weight: bold;
      fill: #6272a4;
      transition: all 0.3s ease;
    }
    
    .pulse-ring {
      transform-origin: 20px 22px;
      animation: pulseActive 2.5s infinite ease-in-out;
      filter: drop-shadow(0 0 2px rgba(80, 250, 123, 0.6));
    }
    .pulse-core {
      fill: #50fa7b;
      filter: drop-shadow(0 0 2px rgba(80, 250, 123, 0.6));
    }
    .laser-beam {
      stroke: #ff79c6;
      stroke-width: 1.5;
      animation: laserScan 4s infinite ease-in-out;
      filter: url(#glow-laser);
    }
  </style>

  <!-- Interactive Group Wrapper -->
  <g class="card-g">
    <!-- Card Base Panel -->
    <rect x="5" y="5" width="370" height="210" rx="10" ry="10" class="card-container"/>

    <!-- Glassmorphic Top Bar -->
    <rect x="6" y="6" width="368" height="32" rx="9" ry="9" fill="#0d1117" fill-opacity="0.6"/>
    <line x1="5" y1="38" x2="375" y2="38" stroke="#bd00ff" stroke-width="0.5" stroke-opacity="0.3" />

    <!-- Interactive Status Module -->
    <circle cx="20" cy="22" r="6" fill="none" stroke="#50fa7b" stroke-width="1" class="pulse-ring"/>
    <circle cx="20" cy="22" r="3" class="pulse-core"/>
    <text x="32" y="25" class="status-lbl">LIVE_DEPLOY</text>

    <text x="350" y="25" text-anchor="end" class="subtitle-text">ID: RESUME_HUB_02</text>

    <!-- Animated Document Scanning Laser Line -->
    <line x1="15" y1="45" x2="365" y2="45" class="laser-beam" />

    <!-- Main Project Info -->
    <text x="20" y="65" class="title-text">🤖 Resumehub.store</text>
    <text x="20" y="80" class="subtitle-text">Intelligent Document Generation</text>

    <!-- Detailed Bullet Text -->
    <text x="20" y="105" class="desc-text">• Architected AI bot for dynamic resume compilation.</text>
    <text x="20" y="122" class="desc-text">• Formulated flexible schemas and document parsers.</text>
    <text x="20" y="139" class="desc-text">• Deployed with fully automated CI/CD pipeline integration.</text>

    <!-- Tech Badges (Horizontal Grid) -->
    <g transform="translate(20, 160)">
      <!-- Badge 1: Python -->
      <g>
        <rect width="50" height="18" class="tech-badge-bg"/>
        <text x="25" y="12" text-anchor="middle" class="tech-text">Python</text>
      </g>
      <!-- Badge 2: FastAPI -->
      <g transform="translate(55, 0)">
        <rect width="55" height="18" class="tech-badge-bg"/>
        <text x="27.5" y="12" text-anchor="middle" class="tech-text">FastAPI</text>
      </g>
      <!-- Badge 3: Render -->
      <g transform="translate(115, 0)">
        <rect width="50" height="18" class="tech-badge-bg"/>
        <text x="25" y="12" text-anchor="middle" class="tech-text">Render</text>
      </g>
      <!-- Badge 4: CI/CD -->
      <g transform="translate(170, 0)">
        <rect width="45" height="18" class="tech-badge-bg"/>
        <text x="22.5" y="12" text-anchor="middle" class="tech-text">CI/CD</text>
      </g>
    </g>

    <!-- Interactive Launch Link Trigger -->
    <text x="350" y="200" text-anchor="end" class="launch-btn">[LAUNCH_SYSTEM] ↗</text>
  </g>
</svg>
