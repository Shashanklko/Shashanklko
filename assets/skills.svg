<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="100%" height="100%">
  <defs>
    <!-- Cyan glow effect -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#00f0ff" flood-opacity="0.6"/>
    </filter>
    <!-- Magenta glow effect -->
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#bd00ff" flood-opacity="0.6"/>
    </filter>
    <!-- Green glow effect -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#50fa7b" flood-opacity="0.8"/>
    </filter>

    <!-- Deep grid pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.05"/>
    </pattern>
  </defs>

  <style>
    @keyframes panelGlow {
      0%, 100% { stroke: #00f0ff; stroke-opacity: 0.3; }
      50% { stroke: #bd00ff; stroke-opacity: 0.7; }
    }
    @keyframes pulseGreen {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes flow {
      to {
        stroke-dashoffset: -20;
      }
    }
    @keyframes skillGrow {
      0% { width: 0%; }
    }
    @keyframes rotateRad {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .main-container {
      fill: #090d16;
      stroke: #00f0ff;
      stroke-width: 1;
      stroke-opacity: 0.4;
    }
    .grid-overlay {
      fill: url(#grid);
    }
    .panel {
      fill: #0d1117;
      fill-opacity: 0.8;
      stroke: #00f0ff;
      stroke-width: 1.5;
      transition: all 0.4s ease-in-out;
      cursor: pointer;
    }
    .panel:hover {
      fill-opacity: 0.95;
      stroke: #bd00ff;
      transform: translateY(-4px);
      filter: drop-shadow(0 8px 16px rgba(189, 0, 255, 0.2));
    }
    .panel-1:hover ~ .connection-line {
      stroke: #bd00ff;
    }
    .panel-header {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      font-weight: bold;
      fill: #00f0ff;
      letter-spacing: 1px;
    }
    .skill-title {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #8be9fd;
    }
    .skill-bar-bg {
      fill: #1b2438;
      rx: 3px;
    }
    .skill-bar-fill-cyan {
      fill: #00f0ff;
      rx: 3px;
      filter: drop-shadow(0 0 2px rgba(0, 240, 255, 0.6));
    }
    .skill-bar-fill-magenta {
      fill: #bd00ff;
      rx: 3px;
      filter: drop-shadow(0 0 2px rgba(189, 0, 255, 0.6));
    }
    .skill-bar-fill-green {
      fill: #50fa7b;
      rx: 3px;
      filter: drop-shadow(0 0 2px rgba(80, 250, 123, 0.6));
    }
    
    .status-dot {
      fill: #50fa7b;
      animation: pulseGreen 2s infinite ease-in-out;
      filter: url(#glow-green);
    }
    .radar {
      transform-origin: 230px 75px;
      animation: rotateRad 8s infinite linear;
    }
    .radar-2 {
      transform-origin: 490px 75px;
      animation: rotateRad 12s infinite linear reverse;
    }
    .radar-3 {
      transform-origin: 750px 75px;
      animation: rotateRad 10s infinite linear;
    }
    
    .data-pipe {
      stroke: #00f0ff;
      stroke-width: 1;
      stroke-opacity: 0.3;
      stroke-dasharray: 4 4;
      animation: flow 2s infinite linear;
    }
    .data-pipe-reverse {
      stroke: #bd00ff;
      stroke-width: 1;
      stroke-opacity: 0.4;
      stroke-dasharray: 4 4;
      animation: flow 2.5s infinite linear reverse;
    }
    .stat-label {
      font-family: 'Fira Code', monospace;
      font-size: 9px;
      fill: #6272a4;
    }
  </style>

  <!-- Main Background Container -->
  <rect x="2" y="2" width="796" height="336" rx="12" ry="12" class="main-container"/>
  <rect x="3" y="3" width="794" height="334" rx="11" ry="11" class="grid-overlay"/>

  <!-- Glowing Header Tech Line -->
  <line x1="20" y1="35" x2="780" y2="35" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.3" />
  <circle cx="400" cy="35" r="3" fill="#00f0ff" filter="url(#glow-cyan)" />
  <text x="400" y="25" text-anchor="middle" font-family="'Fira Code', monospace" font-size="12" fill="#6272a4" letter-spacing="3">TECHNICAL ARSENAL INTEGRATION</text>

  <!-- Flowing Data Pipes between Panels -->
  <path d="M 260 170 Q 275 140, 290 170 T 320 170" fill="none" class="data-pipe"/>
  <path d="M 520 170 Q 535 190, 550 170 T 580 170" fill="none" class="data-pipe-reverse"/>

  <!-- ==================== PANEL 1: LANGUAGES (LEFT) ==================== -->
  <g transform="translate(20, 50)">
    <rect width="240" height="265" rx="8" class="panel"/>
    
    <!-- Panel Header -->
    <text x="15" y="25" class="panel-header">⚡ LANGUAGES &amp; CORE</text>
    <circle cx="215" cy="21" r="3" class="status-dot"/>
    
    <!-- Mini Technical radar graphics -->
    <circle cx="230" cy="25" r="6" fill="none" stroke="#6272a4" stroke-width="0.5"/>
    <line x1="230" y1="19" x2="230" y2="31" stroke="#6272a4" stroke-width="0.5"/>
    <line x1="224" y1="25" x2="236" y2="25" stroke="#6272a4" stroke-width="0.5"/>

    <line x1="15" y1="38" x2="225" y2="38" stroke="#00f0ff" stroke-width="0.5" stroke-opacity="0.2"/>

    <!-- Skill 1: Python -->
    <g transform="translate(15, 55)">
      <text x="0" y="12" class="skill-title">Python (Data/Bots/APIs)</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="195" height="6" class="skill-bar-fill-cyan"/>
      <text x="190" y="12" class="stat-label">90%</text>
    </g>

    <!-- Skill 2: JS / TS -->
    <g transform="translate(15, 95)">
      <text x="0" y="12" class="skill-title">JavaScript / TypeScript</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="180" height="6" class="skill-bar-fill-cyan"/>
      <text x="190" y="12" class="stat-label">85%</text>
    </g>

    <!-- Skill 3: Java / Spring -->
    <g transform="translate(15, 135)">
      <text x="0" y="12" class="skill-title">Java (Spring Boot / Core)</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="168" height="6" class="skill-bar-fill-cyan"/>
      <text x="190" y="12" class="stat-label">80%</text>
    </g>

    <!-- Skill 4: C++ / Rust -->
    <g transform="translate(15, 175)">
      <text x="0" y="12" class="skill-title">C++ / Rust (Systems)</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="126" height="6" class="skill-bar-fill-cyan"/>
      <text x="190" y="12" class="stat-label">60%</text>
    </g>
    
    <!-- Skill 5: HTML5 / CSS3 -->
    <g transform="translate(15, 215)">
      <text x="0" y="12" class="skill-title">HTML5 / Modern CSS3</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="199" height="6" class="skill-bar-fill-cyan"/>
      <text x="190" y="12" class="stat-label">95%</text>
    </g>
  </g>

  <!-- ==================== PANEL 2: FRAMEWORKS (CENTER) ==================== -->
  <g transform="translate(280, 50)">
    <rect width="240" height="265" rx="8" class="panel"/>
    
    <!-- Panel Header -->
    <text x="15" y="25" class="panel-header">🧠 FRAMEWORKS &amp; LIBS</text>
    <circle cx="215" cy="21" r="3" class="status-dot"/>
    
    <!-- Mini Technical radar graphics -->
    <circle cx="230" cy="25" r="6" fill="none" stroke="#6272a4" stroke-width="0.5" class="radar-2"/>
    <line x1="230" y1="19" x2="230" y2="31" stroke="#6272a4" stroke-width="0.5" class="radar-2"/>

    <line x1="15" y1="38" x2="225" y2="38" stroke="#bd00ff" stroke-width="0.5" stroke-opacity="0.2"/>

    <!-- Skill 1: React / Next.js -->
    <g transform="translate(15, 55)">
      <text x="0" y="12" class="skill-title">React / Next.js</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="189" height="6" class="skill-bar-fill-magenta"/>
      <text x="190" y="12" class="stat-label">90%</text>
    </g>

    <!-- Skill 2: Node.js / Express -->
    <g transform="translate(15, 95)">
      <text x="0" y="12" class="skill-title">Node.js / Express</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="178" height="6" class="skill-bar-fill-magenta"/>
      <text x="190" y="12" class="stat-label">85%</text>
    </g>

    <!-- Skill 3: Spring Boot / Hibernate -->
    <g transform="translate(15, 135)">
      <text x="0" y="12" class="skill-title">Spring Boot / Hibernate</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="168" height="6" class="skill-bar-fill-magenta"/>
      <text x="190" y="12" class="stat-label">80%</text>
    </g>

    <!-- Skill 4: FastAPI -->
    <g transform="translate(15, 175)">
      <text x="0" y="12" class="skill-title">FastAPI (Python REST)</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="178" height="6" class="skill-bar-fill-magenta"/>
      <text x="190" y="12" class="stat-label">85%</text>
    </g>
    
    <!-- Skill 5: Socket.io -->
    <g transform="translate(15, 215)">
      <text x="0" y="12" class="skill-title">Socket.io (Realtime Logic)</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="157" height="6" class="skill-bar-fill-magenta"/>
      <text x="190" y="12" class="stat-label">75%</text>
    </g>
  </g>

  <!-- ==================== PANEL 3: INFRASTRUCTURE (RIGHT) ==================== -->
  <g transform="translate(540, 50)">
    <rect width="240" height="265" rx="8" class="panel"/>
    
    <!-- Panel Header -->
    <text x="15" y="25" class="panel-header">⚙️ CLOUD, DBS &amp; TOOLS</text>
    <circle cx="215" cy="21" r="3" class="status-dot"/>
    
    <!-- Mini Technical radar graphics -->
    <circle cx="230" cy="25" r="6" fill="none" stroke="#6272a4" stroke-width="0.5"/>
    <circle cx="230" cy="25" r="3" fill="#6272a4"/>

    <line x1="15" y1="38" x2="225" y2="38" stroke="#50fa7b" stroke-width="0.5" stroke-opacity="0.2"/>

    <!-- Skill 1: PostgreSQL / MongoDB -->
    <g transform="translate(15, 55)">
      <text x="0" y="12" class="skill-title">PostgreSQL / MongoDB</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="178" height="6" class="skill-bar-fill-green"/>
      <text x="190" y="12" class="stat-label">85%</text>
    </g>

    <!-- Skill 2: Docker & Containers -->
    <g transform="translate(15, 95)">
      <text x="0" y="12" class="skill-title">Docker (Containerization)</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="168" height="6" class="skill-bar-fill-green"/>
      <text x="190" y="12" class="stat-label">80%</text>
    </g>

    <!-- Skill 3: Git & CI/CD Pipelines -->
    <g transform="translate(15, 135)">
      <text x="0" y="12" class="skill-title">Git / GitHub Actions CI/CD</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="189" height="6" class="skill-bar-fill-green"/>
      <text x="190" y="12" class="stat-label">90%</text>
    </g>

    <!-- Skill 4: Linux Systems / Bash -->
    <g transform="translate(15, 175)">
      <text x="0" y="12" class="skill-title">Linux Systems / Shell Script</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="178" height="6" class="skill-bar-fill-green"/>
      <text x="190" y="12" class="stat-label">85%</text>
    </g>
    
    <!-- Skill 5: Cloud Deployment & API Ops -->
    <g transform="translate(15, 215)">
      <text x="0" y="12" class="skill-title">AWS / Render / Postman</text>
      <rect x="0" y="20" width="210" height="6" class="skill-bar-bg"/>
      <rect x="0" y="20" width="157" height="6" class="skill-bar-fill-green"/>
      <text x="190" y="12" class="stat-label">75%</text>
    </g>
  </g>
</svg>
